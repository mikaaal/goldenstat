name: Daily Database Import

on:
  # Kör dagligen kl 02:00 UTC (03:00/04:00 svensk tid beroende på sommartid)
  schedule:
    - cron: '0 2 * * *'

  # Tillåt manuell körning
  workflow_dispatch:
    inputs:
      skip_league_import:
        description: 'Skippa seriematch-import (daily_import.py)'
        required: false
        default: true
        type: boolean

  # Kör när importfiler ändras (för testning)
  push:
    paths:
      - 'daily_import.py'
      - 'smart_season_importer.py'
      - 'nightly_cup_import.py'
      - 'import_cup.py'
      - 'cup_database.py'
      - 'apply_migrations.py'
      - 'migrations/**'
      - '.github/workflows/daily-import.yml'
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Grant write permissions to push changes back to repo
permissions:
  contents: write

jobs:
  import-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history för git operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Download databases from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📥 Hämtar databaser från GitHub Release..."
          if gh release view db-latest >/dev/null 2>&1; then
            gh release download db-latest --pattern "*.db" --clobber || true
            echo "✅ Databaser hämtade:"
            ls -lh *.db 2>/dev/null || echo "Inga .db-filer hittades"
          else
            echo "⚠️  Ingen release hittades, skapar nya databaser"
          fi

      - name: Apply database migrations
        run: |
          echo "🔧 Applicerar SQL-migreringar..."
          python apply_migrations.py goldenstat.db migrations/goldenstat
          python apply_migrations.py cups.db migrations/cups
          python apply_migrations.py sommarserien.db migrations/sommarserien

      - name: Run daily import
        if: ${{ github.event.inputs.skip_league_import != 'true' }}
        run: |
          echo "🤖 Kör daglig import..."
          python daily_import.py

      - name: Run sommarserien import
        run: |
          echo "☀️ Kör sommarserien-import..."
          python import_sommarserien_2026.py

      - name: Run nightly cup import
        run: |
          echo "🏆 Kör cup-import..."
          python nightly_cup_import.py

      - name: Check if databases were updated
        id: check_changes
        run: |
          changed=false
          if [ -f "goldenstat.db" ]; then
            echo "✅ goldenstat.db uppdaterad"
            ls -lh goldenstat.db
            changed=true
          fi
          if [ -f "cups.db" ]; then
            echo "✅ cups.db uppdaterad"
            ls -lh cups.db
            changed=true
          fi
          if [ -f "sommarserien.db" ]; then
            echo "✅ sommarserien.db uppdaterad"
            ls -lh sommarserien.db
            changed=true
          fi
          if [ "$changed" = "false" ]; then
            echo "⚠️ Ingen databas skapad"
          fi
          echo "changed=$changed" >> $GITHUB_OUTPUT

      - name: Upload databases to GitHub Release
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📦 Laddar upp databaser till GitHub Release..."

          # Skapa release om den inte finns, annars uppdatera
          if gh release view db-latest >/dev/null 2>&1; then
            echo "Release db-latest finns redan, uppdaterar..."
          else
            echo "Skapar ny release db-latest..."
            gh release create db-latest --title "Database files" \
              --notes "Automatiskt uppdaterade databaser från daily import. Senast: $(date +%Y-%m-%d)" \
              --latest=false
          fi

          # Ladda upp/ersätt databasfiler
          gh release upload db-latest \
            goldenstat.db cups.db riksserien.db sommarserien.db \
            --clobber

          echo "✅ Databaser uppladdade till release db-latest"

      # Railway auto-deploys via GitHub integration when import logs are pushed below

      - name: Commit and push import logs
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Lägg till senaste loggarna
          latest_log=$(ls -t import_logs/daily_import_*.json 2>/dev/null | head -1)
          if [ -f "$latest_log" ]; then
            git add "$latest_log" || true
          fi
          git add import_logs/cup_*.json 2>/dev/null || true
          git add import_logs/sommarserien_*.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "Inga ändringar att committa"
          else
            git commit -m "🤖 Daily import $(date +%Y-%m-%d)"
            git push || echo "⚠️ Kunde inte pusha ändringar"
          fi

      - name: Upload import logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: import-log-${{ github.run_number }}
          path: |
            import_logs/daily_import_*.json
            import_logs/cup_*.json
            import_logs/sommarserien_*.json
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## 📊 Import Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if ls import_logs/daily_import_*.json 1>/dev/null 2>&1; then
            latest_log=$(ls -t import_logs/daily_import_*.json | head -1)
            echo "### Liga-import:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            python -c "import json; log=json.load(open('$latest_log')); print(json.dumps(log.get('statistics', {}), indent=2))"  >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "cups.db" ]; then
            echo "### Cup-import:" >> $GITHUB_STEP_SUMMARY
            count=$(python -c "import sqlite3; c=sqlite3.connect('cups.db'); print(c.execute('SELECT COUNT(*) FROM tournaments').fetchone()[0]); c.close()" 2>/dev/null || echo "?")
            echo "Turneringar i databasen: $count" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Import slutförd $(date)" >> $GITHUB_STEP_SUMMARY
